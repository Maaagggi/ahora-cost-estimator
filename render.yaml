# Render Blueprint — AHORA AI Recruitment Cost Estimator
# Static site built with Vite (React + TypeScript), served from Render's CDN.
services:
  - type: web
    name: ahora-cost-estimator
    runtime: static
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist

    # No client-side router, but keep SPA fallback so deep links resolve.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      # Vite fingerprints asset filenames — safe to cache forever.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

      # Always revalidate the HTML entrypoint.
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate

      # Security headers
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
